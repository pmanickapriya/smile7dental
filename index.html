<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile7 Dental Clinic — Dr. P. Manickapriya</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #2b2f33;
            --teal: #5bbcd6;
            --teal-light: #7dcfe6;
            --cream: #f7f4ef;
            --warm: #ede8df;
            --gold: #5bbcd6;
            --white: #ffffff;
            --text: #1e2d3d;
            --muted: #7a8a96;
            --border: #e0dbd2;
            --card-bg: #ffffff;
            --error: #c0392b;
            --success: #1a7f60;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: var(--cream);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 60px;
            background: rgba(13, 27, 42, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(200, 169, 110, 0.15);
            transition: padding .3s;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--white);
            letter-spacing: 0.01em;
            text-decoration: none;
        }

        .logo span { color: var(--gold); font-style: italic; }

        .nav-links { display: flex; gap: 36px; list-style: none; }
        .nav-links a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.04em;
            transition: color .2s;
        }
        .nav-links a:hover { color: var(--gold); }

        .nav-cta {
            background: var(--teal);
            color: white !important;
            padding: 9px 22px;
            border-radius: 50px;
            font-weight: 600 !important;
            transition: background .2s, transform .15s !important;
        }
        .nav-cta:hover { background: var(--teal-light) !important; transform: translateY(-1px); }

        /* ─── APPOINTMENT SECTION ─── */
        #appointment {
            background: var(--navy);
            position: relative;
            overflow: hidden;
            padding: 100px 60px;
        }

        #appointment::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 50% 70% at 90% 40%, rgba(91, 188, 214, 0.2) 0%, transparent 70%);
        }

        .appt-wrap {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 80px;
            align-items: start;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }

        .appt-left .section-title { color: var(--white); font-family: 'Playfair Display', serif; font-size: 44px; margin-bottom: 20px; }
        .appt-left .section-sub { color: rgba(255, 255, 255, 0.5); margin-bottom: 40px; }

        .appt-info { display: flex; flex-direction: column; gap: 20px; }
        .info-row { display: flex; align-items: flex-start; gap: 14px; color: white; }
        .info-icon { width: 38px; height: 38px; background: rgba(91, 188, 214, 0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        /* ─── FORM STYLING ─── */
        .appt-form {
            background: var(--white);
            border-radius: 20px;
            padding: 44px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 28px;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: var(--cream);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--teal);
            background: white;
            box-shadow: 0 0 0 3px rgba(91, 188, 214, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { background: var(--teal-light); transform: translateY(-2px); }

        #form-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .appt-wrap { grid-template-columns: 1fr; gap: 40px; }
            .form-row { grid-template-columns: 1fr; }
            nav { padding: 18px 20px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">Smile<span>7</span> Dental</a>
    <ul class="nav-links">
        <li><a href="#strategy">Strategy</a></li>
        <li><a href="#why">Why Us</a></li>
        <li><a href="#appointment" class="nav-cta">Book Now</a></li>
    </ul>
</nav>

<section id="appointment">
    <div class="appt-wrap">
        <div class="appt-left">
            <h2 class="section-title">Book Your <em>Consultation</em></h2>
            <p class="section-sub">Take the first step towards a healthier smile. Fill out the form, and our clinical team will get back to you within 24 hours.</p>
            
            <div class="appt-info">
                <div class="info-row">
                    <div class="info-icon">📍</div>
                    <div class="info-text"><strong>Location</strong><br>Port Harcourt, Nigeria</div>
                </div>
                <div class="info-row">
                    <div class="info-icon">🕒</div>
                    <div class="info-text"><strong>Hours</strong><br>Mon - Sat: 9:00 AM - 6:00 PM</div>
                </div>
            </div>
        </div>

        <form id="dental-form" action="https://formspree.io/f/YOUR_ID_HERE" method="POST" class="appt-form">
            <div class="form-title">Patient Details</div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="25" min="1" max="115" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Service Required</label>
                <select name="service" required>
                    <option value="General Consultation">General Consultation</option>
                    <option value="Teeth Whitening">Teeth Whitening</option>
                    <option value="Braces">Braces</option>
                    <option value="Cleaning">Scaling & Polishing</option>
                </select>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="3" placeholder="Tell us about your concern..."></textarea>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Request Appointment</button>
            <div id="form-status"></div>
        </form>
    </div>
</section>

<script>
    const form = document.getElementById("dental-form");
    const status = document.getElementById("form-status");
    const btn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Sending...";
        
        const data = new FormData(form);
        const response = await fetch(form.action, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            status.style.display = "block";
            status.style.color = "var(--success)";
            status.innerText = "Thanks! We've received your request.";
            form.reset();
            btn.disabled = false;
            btn.innerText = "Request Appointment";
        } else {
            status.style.display = "block";
            status.style.color = "var(--error)";
            status.innerText = "Oops! Something went wrong.";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
