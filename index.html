<section id="appointment">
  <div class="appt-wrap">
    <div class="appt-left">
      <div class="section-tag">Booking</div>
      <h2 class="section-title">Ready to <em>Smile</em> Again?</h2>
      <p class="section-sub">Book your consultation with Dr. P. Manickapriya today. Our team at Smile7 Dental Clinic is ready to provide you with exceptional care.</p>
      
      <div class="appt-info">
        <div class="info-row">
          <div class="info-icon">📍</div>
          <div class="info-text">
            <strong>Visit Us</strong>
            <span>27 Wokogoloma street, Portharcourt, Rivers State</span>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">📞</div>
          <div class="info-text">
            <strong>Call/WhatsApp</strong>
            <span>08161451202, 09049786611</span>
          </div>
        </div>
      </div>
    </div>

    <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="appt-form">
      <div class="form-title">Request Appointment</div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="email@example.com" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="Your mobile number" required>
        </div>
        <div class="form-group">
          <label>Treatment Service</label>
          <select name="service" required>
            <option value="" disabled selected>Select Service</option>
            <option value="General Checkup">General Checkup</option>
            <option value="Cosmetic Dentistry">Cosmetic Dentistry</option>
            <option value="Braces/Aligners">Braces/Aligners</option>
            <option value="Dental Implants">Dental Implants</option>
            <option value="Emergency Care">Emergency Care</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Patient Age</label>
          <input type="number" name="age" placeholder="e.g. 25" min="1" max="120" required>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select name="gender" required>
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Briefly Describe Concern</label>
        <textarea name="message" placeholder="How can we help your smile?"></textarea>
      </div>

      <input type="hidden" name="_subject" value="New Appointment Request - Smile7 Dental">
      
      <button type="submit" class="submit-btn">Confirm Request</button>
    </form>
    </div>
</section>
